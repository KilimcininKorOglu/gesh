# Gesh (𒄑) - Goreleaser Configuration
# Triggered by version tags (v*)

project_name: gesh

builds:
  - id: "gesh"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: darwin
        goarch: arm
    main: .
    binary: gesh
    ldflags:
      - -s -w
      - -X github.com/KilimcininKorOglu/gesh/pkg/version.Version={{.Version}}
      - -X github.com/KilimcininKorOglu/gesh/pkg/version.Commit={{.ShortCommit}}
      - -X github.com/KilimcininKorOglu/gesh/pkg/version.BuildDate={{.Date}}

archives:
  - id: "gesh"
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
